<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escena 3D Profesional | Práctica 04</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        /* Interfaz de usuario profesional */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .info-card {
            background: rgba(20, 30, 50, 0.85);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            border-left: 4px solid #00ff88;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 250px;
        }
        
        .info-card h3 {
            margin: 0 0 10px 0;
            color: #00ff88;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        .info-card p {
            margin: 5px 0;
            color: #ccd6f6;
            font-size: 0.9rem;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .badge {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .controls-panel {
            background: rgba(20, 30, 50, 0.85);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            border-right: 4px solid #0099ff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .controls-panel button {
            background: transparent;
            color: white;
            border: 1px solid #0099ff;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .controls-panel button:hover {
            background: #0099ff;
            color: #0a192f;
        }
        
        .controls-panel button.active {
            background: #00ff88;
            border-color: #00ff88;
            color: #0a192f;
        }
        
        .back-link {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 153, 255, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: #0099ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 153, 255, 0.4);
        }
        
        .fps-counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: #00ff88;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9rem;
            z-index: 100;
            border: 1px solid #00ff88;
        }
        
        /* Animación de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .ui-panel, .back-link, .fps-counter {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <!-- Panel de información principal -->
    <div class="ui-panel">
        <div class="info-card">
            <h3>⚡ ESCENA 3D PROFESIONAL</h3>
            <p><span class="accent-green">●</span> Práctica 04: Geometrías y Materiales</p>
            <p><span class="accent-blue">●</span> Varias geometrías (7+)</p>
            <p><span class="accent-pink">●</span> Materiales PBR con reflectividad</p>
            <div class="stats-row">
                <span>Objetos:</span>
                <span class="badge" id="object-counter">0</span>
            </div>
        </div>
        
        <div class="controls-panel">
            <h4>🎮 CONTROLES</h4>
            <div>
                <button id="btn-rotate" class="active">Rotar Todo</button>
                <button id="btn-stop">Pausar</button>
                <button id="btn-wireframe">Wireframe</button>
            </div>
            <div class="mt-10">
                <button id="btn-day">🌞 Día</button>
                <button id="btn-night">🌙 Noche</button>
                <button id="btn-neon">🌈 Neón</button>
            </div>
            <p class="info-text">
                🖱️ Click + arrastrar: Rotar vista<br>
                🔍 Rueda: Zoom | ⚡ Scroll: Velocidad
            </p>
        </div>
    </div>
    
    <!-- Botón de regreso -->
    <a href="index.html" class="back-link">← Volver al Portafolio</a>
    
    <!-- Contador FPS -->
    <div class="fps-counter" id="fps-counter">FPS: <span id="fps-value">60</span></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ========== CONFIGURACIÓN INICIAL ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.Fog(0x0a0a1a, 10, 30);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 4, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ 
            antialias: true,
            powerPreference: "high-performance",
            alpha: false
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ========== ILUMINACIÓN PROFESIONAL ==========
        
        // Luz ambiental base
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        // Luz principal (sol)
        const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.5);
        sunLight.position.set(5, 12, 8);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        const d = 12;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 20;
        sunLight.shadow.bias = -0.0005;
        scene.add(sunLight);
        
        // Luz de relleno cálida
        const fillLight = new THREE.PointLight(0xffaa66, 0.8);
        fillLight.position.set(-5, 3, 5);
        fillLight.castShadow = true;
        scene.add(fillLight);
        
        // Luz de acento fría
        const accentLight = new THREE.PointLight(0x6688ff, 0.5);
        accentLight.position.set(3, 2, -5);
        accentLight.castShadow = true;
        scene.add(accentLight);
        
        // Luces decorativas
        const light1 = new THREE.PointLight(0xff00aa, 0.3);
        light1.position.set(2, 1, 2);
        scene.add(light1);
        
        const light2 = new THREE.PointLight(0x00ffaa, 0.3);
        light2.position.set(-2, 1, -2);
        scene.add(light2);

        // ========== ELEMENTOS DE ESCENA ==========
        
        // Suelo con textura procedural
        const floorGeometry = new THREE.CircleGeometry(15, 32);
        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a2e,
            roughness: 0.7,
            metalness: 0.1,
            emissive: new THREE.Color(0x050510)
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.5;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Grid decorativo
        const gridHelper = new THREE.GridHelper(20, 20, 0x00ff88, 0x333366);
        gridHelper.position.y = -0.49;
        scene.add(gridHelper);
        
        // Esfera de ambiente (cielo)
        const sphereGeo = new THREE.SphereGeometry(20, 32, 16);
        const sphereMat = new THREE.MeshStandardMaterial({
            color: 0x0a0a1a,
            emissive: new THREE.Color(0x050510),
            side: THREE.BackSide,
            roughness: 0.3,
            metalness: 0.1
        });
        const skySphere = new THREE.Mesh(sphereGeo, sphereMat);
        scene.add(skySphere);

        // ========== CREAR OBJETOS GEOMÉTRICOS ==========
        const objects = [];
        
        // 1. Cubo central con material reflectivo
        const cubeGeo = new THREE.BoxGeometry(1.8, 1.8, 1.8);
        const cubeMat = new THREE.MeshStandardMaterial({
            color: 0xff4444,
            emissive: new THREE.Color(0x330000),
            roughness: 0.2,
            metalness: 0.8,
            emissiveIntensity: 0.5
        });
        const cube = new THREE.Mesh(cubeGeo, cubeMat);
        cube.position.set(-3, 0.5, 0);
        cube.castShadow = true;
        cube.receiveShadow = true;
        scene.add(cube);
        objects.push(cube);
        
        // 2. Esfera con acabado metálico
        const sphereGeo2 = new THREE.SphereGeometry(1.2, 64, 32);
        const sphereMat2 = new THREE.MeshStandardMaterial({
            color: 0x44ff44,
            emissive: new THREE.Color(0x003300),
            roughness: 0.1,
            metalness: 0.9,
            emissiveIntensity: 0.3
        });
        const sphere = new THREE.Mesh(sphereGeo2, sphereMat2);
        sphere.position.set(3, 0.8, 0);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        scene.add(sphere);
        objects.push(sphere);
        
        // 3. Toro (donut) con material brillante
        const torusGeo = new THREE.TorusGeometry(1.2, 0.3, 32, 64);
        const torusMat = new THREE.MeshStandardMaterial({
            color: 0x4444ff,
            emissive: new THREE.Color(0x000033),
            roughness: 0.3,
            metalness: 0.6,
            emissiveIntensity: 0.4
        });
        const torus = new THREE.Mesh(torusGeo, torusMat);
        torus.position.set(0, 1.2, -3);
        torus.rotation.x = Math.PI / 2;
        torus.castShadow = true;
        torus.receiveShadow = true;
        scene.add(torus);
        objects.push(torus);
        
        // 4. Cilindro con textura
        const cylinderGeo = new THREE.CylinderGeometry(1, 1, 2, 32);
        const cylinderMat = new THREE.MeshStandardMaterial({
            color: 0xff44ff,
            emissive: new THREE.Color(0x330033),
            roughness: 0.4,
            metalness: 0.5,
            emissiveIntensity: 0.3
        });
        const cylinder = new THREE.Mesh(cylinderGeo, cylinderMat);
        cylinder.position.set(0, 0.5, 3);
        cylinder.castShadow = true;
        cylinder.receiveShadow = true;
        scene.add(cylinder);
        objects.push(cylinder);
        
        // 5. Cono (pirámide)
        const coneGeo = new THREE.ConeGeometry(1.2, 2.5, 32);
        const coneMat = new THREE.MeshStandardMaterial({
            color: 0x44ffff,
            emissive: new THREE.Color(0x003333),
            roughness: 0.2,
            metalness: 0.7,
            emissiveIntensity: 0.4
        });
        const cone = new THREE.Mesh(coneGeo, coneMat);
        cone.position.set(4, 0.8, 3);
        cone.castShadow = true;
        cone.receiveShadow = true;
        scene.add(cone);
        objects.push(cone);
        
        // 6. Icosaedro (extra)
        const icoGeo = new THREE.IcosahedronGeometry(1, 0);
        const icoMat = new THREE.MeshStandardMaterial({
            color: 0xffaa00,
            emissive: new THREE.Color(0x332200),
            roughness: 0.3,
            metalness: 0.4,
            emissiveIntensity: 0.3,
            wireframe: false
        });
        const ico = new THREE.Mesh(icoGeo, icoMat);
        ico.position.set(-4, 0.8, 3);
        ico.castShadow = true;
        ico.receiveShadow = true;
        scene.add(ico);
        objects.push(ico);
        
        // 7. Anillo (torus anidado)
        const ringGeo = new THREE.TorusKnotGeometry(0.8, 0.25, 64, 8, 2, 3);
        const ringMat = new THREE.MeshStandardMaterial({
            color: 0xffaa88,
            emissive: new THREE.Color(0x331100),
            roughness: 0.2,
            metalness: 0.8,
            emissiveIntensity: 0.2
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.set(-4, 1.2, -3);
        ring.castShadow = true;
        ring.receiveShadow = true;
        scene.add(ring);
        objects.push(ring);
        
        // Partículas decorativas (estrellas)
        const particlesGeo = new THREE.BufferGeometry();
        const particlesCount = 500;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 30;
            posArray[i+1] = (Math.random() - 0.5) * 20;
            posArray[i+2] = (Math.random() - 0.5) * 30;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({
            color: 0x88aaff,
            size: 0.05,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particles);

        // ========== CONTROLES ==========
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.rotateSpeed = 0.8;
        controls.maxPolarAngle = Math.PI / 2;
        controls.minDistance = 3;
        controls.maxDistance = 20;

        // ========== VARIABLES DE ESTADO ==========
        let rotating = true;
        let rotationSpeed = 0.005;
        let wireframeMode = false;
        
        // Guardar materiales originales para wireframe
        const originalMaterials = objects.map(obj => obj.material.clone());

        // ========== CONTROLES UI ==========
        document.getElementById('btn-rotate').addEventListener('click', () => {
            rotating = true;
            document.getElementById('btn-rotate').classList.add('active');
            document.getElementById('btn-stop').classList.remove('active');
        });
        
        document.getElementById('btn-stop').addEventListener('click', () => {
            rotating = false;
            document.getElementById('btn-stop').classList.add('active');
            document.getElementById('btn-rotate').classList.remove('active');
        });
        
        document.getElementById('btn-wireframe').addEventListener('click', (e) => {
            wireframeMode = !wireframeMode;
            objects.forEach((obj, index) => {
                if (Array.isArray(obj.material)) {
                    obj.material.forEach(mat => mat.wireframe = wireframeMode);
                } else {
                    obj.material.wireframe = wireframeMode;
                }
            });
            e.target.textContent = wireframeMode ? '⬜ Sólido' : '🔲 Wireframe';
        });
        
        // Temas de iluminación
        document.getElementById('btn-day').addEventListener('click', () => {
            scene.background.setHex(0x87CEEB);
            scene.fog.color.setHex(0x87CEEB);
            ambientLight.intensity = 0.8;
            sunLight.intensity = 2;
            fillLight.intensity = 1;
            accentLight.intensity = 0.8;
        });
        
        document.getElementById('btn-night').addEventListener('click', () => {
            scene.background.setHex(0x0a0a1a);
            scene.fog.color.setHex(0x0a0a1a);
            ambientLight.intensity = 0.2;
            sunLight.intensity = 0.5;
            fillLight.intensity = 0.3;
            accentLight.intensity = 0.4;
        });
        
        document.getElementById('btn-neon').addEventListener('click', () => {
            scene.background.setHex(0x000000);
            scene.fog.color.setHex(0x000000);
            ambientLight.intensity = 0.1;
            sunLight.intensity = 0.2;
            fillLight.intensity = 0.2;
            accentLight.intensity = 0.2;
            
            // Colores neón para objetos
            objects[0].material.color.setHex(0xff00ff);
            objects[1].material.color.setHex(0x00ffff);
            objects[2].material.color.setHex(0xffff00);
            objects[3].material.color.setHex(0xff6600);
            objects[4].material.color.setHex(0x00ff88);
            objects[5].material.color.setHex(0xff0066);
        });

        // ========== FPS COUNTER ==========
        let frameCount = 0;
        let lastTime = performance.now();
        const fpsSpan = document.getElementById('fps-value');

        // ========== ANIMACIÓN ==========
        function animate() {
            requestAnimationFrame(animate);
            
            // Calcular FPS
            frameCount++;
            const now = performance.now();
            const delta = now - lastTime;
            if (delta >= 1000) {
                const fps = Math.round((frameCount * 1000) / delta);
                fpsSpan.textContent = fps;
                frameCount = 0;
                lastTime = now;
            }
            
            // Rotar objetos
            if (rotating) {
                objects.forEach((obj, index) => {
                    obj.rotation.x += rotationSpeed * (index % 2 === 0 ? 1 : -1);
                    obj.rotation.y += rotationSpeed * 1.5;
                    obj.rotation.z += rotationSpeed * 0.5;
                });
                
                // Rotar partículas
                particles.rotation.y += 0.0002;
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();

        // ========== REDIMENSIONAMIENTO ==========
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ========== VELOCIDAD CON SCROLL ==========
        window.addEventListener('wheel', (e) => {
            rotationSpeed += e.deltaY * -0.00001;
            rotationSpeed = Math.max(0.001, Math.min(0.02, rotationSpeed));
        });

        // ========== CONSOLA ==========
        console.log('🚀 Escena 3D Profesional inicializada');
        console.log('📊 Objetos:', objects.length);
        console.log('🎨 Materiales PBR con reflectividad');
    </script>
</body>
</html>
